name: Trigger RSS Updates

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger update-feeds workflow
        uses: actions/github-script@v8
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const workflowId = 'update.yml';
            
            try {
              await github.rest.actions.createWorkflowDispatch({
                owner,
                repo,
                workflow_id: workflowId,
                ref: 'main'
              });
              console.log('Successfully triggered update.yml');
            } catch (error) {
              if (error.status === 409 || error.message?.includes('409')) {
                console.log('Workflow already running, skipping trigger');
              } else {
                console.log('Error triggering workflow:', error.message || error);
              }
            }
